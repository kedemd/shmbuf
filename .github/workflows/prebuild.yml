name: Prebuild

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prebuild-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prebuildify --napi --strip
      - run: cp prebuilds/linux-x64/shmbuf.node prebuilds/shmbuf-linux-x64.node
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: prebuilds/shmbuf-linux-x64.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-x64
          path: prebuilds/shmbuf-linux-x64.node
          retention-days: 7

  prebuild-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - run: npm ci
      - run: npx prebuildify --napi --arch arm64
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
      - run: cp prebuilds/linux-arm64/shmbuf.node prebuilds/shmbuf-linux-arm64.node
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: prebuilds/shmbuf-linux-arm64.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-arm64
          path: prebuilds/shmbuf-linux-arm64.node
          retention-days: 7

  prebuild-darwin-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prebuildify --napi --strip
      - run: cp prebuilds/darwin-x64/shmbuf.node prebuilds/shmbuf-darwin-x64.node
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: prebuilds/shmbuf-darwin-x64.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-darwin-x64
          path: prebuilds/shmbuf-darwin-x64.node
          retention-days: 7

  prebuild-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prebuildify --napi --strip
      - run: cp prebuilds/darwin-arm64/shmbuf.node prebuilds/shmbuf-darwin-arm64.node
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: prebuilds/shmbuf-darwin-arm64.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-darwin-arm64
          path: prebuilds/shmbuf-darwin-arm64.node
          retention-days: 7

  prebuild-win32-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prebuildify --napi --strip
      - run: copy prebuilds\win32-x64\shmbuf.node prebuilds\shmbuf-win32-x64.node
        shell: cmd
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: prebuilds/shmbuf-win32-x64.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-win32-x64
          path: prebuilds/shmbuf-win32-x64.node
          retention-days: 7
